# backend/redis.conf
# Конфигурация Redis
#
# Версия: 1.0
# Обновлено: 2026-04-06

# Основные настройки
bind 127.0.0.1
port 6379
protected-mode yes

# Персистентность
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# Память
maxmemory 512mb
maxmemory-policy allkeys-lru

# Логирование
loglevel notice

# Безопасность (пароль задаётся через docker-compose)
# requirepass ${REDIS_PASSWORD}
